.hide{display:none!important}

.fw6{font-weight:600}.fw7{font-weight:700}

<div id="app">
  <!-- Header -->

    <button class="tab-btn" data-tab="projector" onclick="switchTab('projector')" style="background:transparent;color:#666">📊 Projector</button>
    <button class="tab-btn" data-tab="diet" onclick="switchTab('diet')" style="background:transparent;color:#666">🥗 Diet Plan</button>
  </div>

  <!-- ===================== WORKOUT TAB ===================== -->
  <div id="tab-workout">
    <div id="dayTabs" class="scroll-x mb14"></div>
    <div id="dayHeader" class="card flex between center mb10" style="border-left:4px solid;padding:14px 16px"></div>
    <div id="exerciseList" class="flex col gap7"></div>
    <div class="tac mt14 fs11" style="color:#444">Tap exercise to see form · Rest Sat & Sun</div>
  </div>

  <!-- ===================== PROJECTOR TAB ===================== -->
  <div id="tab-projector" class="hide">
    <div class="card mb12 p14">
      <div class="fs11 c888 fw6 ls05 mb8">SELECT DURATION</div>
      <div id="monthBtns" class="flex gap5 wrap"></div>
      <div class="mt14">
        <div class="flex between center mb6">
          <span class="fs11 c888 fw6 ls05">DAILY CALORIES</span>
          <span id="calLabel" class="mono fs16 fw7" style="color:#4ECDC4">1900 kcal</span>
        </div>
        <input type="range" id="calSlider" min="1500" max="2500" step="50" value="1900" oninput="updateProjection()">
        <div class="flex between fs10 c555 mt3"><span>1,500</span><span>Aggressive ← → Moderate</span><span>2,500</span></div>
      </div>
    </div>
    <div id="projStats" class="grid3 mb12"></div>
    <div class="flex gap4 mb10 card p3" style="border:none">
      <button class="sub-tab" data-pv="curve" onclick="switchProjView('curve')" style="background:#4ECDC4;color:#000">Weight Curve</button>
      <button class="sub-tab" data-pv="monthly" onclick="switchProjView('monthly')" style="background:transparent;color:#777">Monthly</button>
      <button class="sub-tab" data-pv="timeline" onclick="switchProjView('timeline')" style="background:transparent;color:#777">Timeline</button>
    </div>
    <div id="projContent"></div>
  </div>

  <!-- ===================== DIET TAB ===================== -->
  <div id="tab-diet" class="hide">
    <!-- Diet calorie selector -->
    <div class="card mb12 p14">
      <div class="flex between center">
        <div>
          <div class="fs17 fw7 cfff">🥗 Daily Meal Plan</div>
          <div class="fs12 c888 mt2">High protein · Fat loss optimized</div>
        </div>
        <div class="tar">
          <div class="fs20 fw7" style="color:#4ECDC4" id="dietCalTotal">1,900</div>
          <div class="fs10 c555">kcal/day</div>
        </div>
      </div>
    </div>

    <!-- Macros Overview -->
    <div class="grid3 mb12" id="macroCards"></div>

    <!-- Diet Sub-tabs -->
    <div class="flex gap4 mb10 card p3" style="border:none">
      <button class="sub-tab" data-dv="meals" onclick="switchDietView('meals')" style="background:#4ECDC4;color:#000">Meals</button>
      <button class="sub-tab" data-dv="protein" onclick="switchDietView('protein')" style="background:transparent;color:#777">Protein Sources</button>
      <button class="sub-tab" data-dv="tips" onclick="switchDietView('tips')" style="background:transparent;color:#777">Tips</button>
    </div>

    <div id="dietContent"></div>
  </div>

  <div class="tac mt16 fs11" style="color:#333;padding-bottom:16px">Results assume consistent training & calorie deficit</div>
</div>

function switchTab(t){
  document.querySelectorAll('[data-tab]').forEach(b=>{b.style.background=b.dataset.tab===t?'#4ECDC4':'transparent';b.style.color=b.dataset.tab===t?'#000':'#666'});
  ['workout','projector','diet'].forEach(id=>{document.getElementById('tab-'+id).classList.toggle('hide',id!==t)});
  const titles={workout:'5-DAY FAT LOSS PLAN',projector:'WEIGHT LOSS PROJECTOR',diet:'DIET & MEAL PLAN'};
  document.getElementById('mainTitle').textContent=titles[t];
  if(t==='projector')updateProjection();
  if(t==='diet')renderDiet();
}

// =========== WORKOUT ===========
function renderWorkout(){
  const w=workouts[activeDay];
  let tabs='';
  workouts.forEach((d,i)=>{
    const active=i===activeDay;
    tabs+=`<button class="day-btn" onclick="setDay(${i})" style="border:2px solid ${active?d.color:'#1a1a1a'};background:${active?d.color+'15':'#141414'};color:${active?d.color:'#666'}"><div style="font-size:15px">${d.emoji}</div><div>${d.day.replace('Day ','D')}</div></button>`;
  });
  document.getElementById('dayTabs').innerHTML=tabs;

  const cc=w.exercises.filter((_,i)=>checkedEx[activeDay+'-'+i]).length;
  const pct=Math.round((cc/w.exercises.length)*100);
  const h=document.getElementById('dayHeader');
  h.style.borderLeftColor=w.color;
  h.innerHTML=`<div><div class="fs17 fw7 cfff">${w.emoji} ${w.title}</div><div class="fs12 c888 mt2">${w.focus}</div></div><div class="tar"><div class="fs20 fw7" style="color:${w.color}">${cc}/${w.exercises.length}</div><div style="height:4px;width:50px;background:#222;border-radius:2px;margin-top:4px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${w.color};border-radius:2px;transition:width .4s"></div></div></div>`;

  let list='';
  w.exercises.forEach((ex,i)=>{
    const done=checkedEx[activeDay+'-'+i];
    const open=expandedEx===i;
    list+=`<div class="card ex-card" style="border:${open?'1.5px solid '+w.color+'55':done?'1px solid '+w.color+'30':'1px solid #1e1e1e'};background:${done?w.color+'0a':'#141414'}">
      <div class="ex-top" onclick="toggleEx(${i})">
        <div class="ex-icon" style="background:${open?w.color+'20':'#1e1e1e'};color:${w.color}">${getIcon(ex.icon)}</div>
        <div class="grow">
          <div class="fw6 fs13" style="color:${done?'#777':'#eee'};text-decoration:${done?'line-through':'none'}">${ex.name}</div>
          <div class="flex gap5 mt4 wrap">
            <span class="ex-tag fw6" style="color:${w.color}">${ex.sets} sets</span>
            <span class="ex-tag cbbb">${ex.reps}</span>
            <span class="ex-tag c777">Rest ${ex.rest}</span>
          </div>
        </div>
        <div class="arrow${open?' open':''}">▼</div>
      </div>
      ${open?`<div style="padding:0 14px 14px" class="fadeIn">
        <div class="form-box" style="background:${w.color}08;border:1px solid ${w.color}20">
          <div style="width:90px;height:90px;flex-shrink:0;color:${w.color};opacity:.9">${getIcon(ex.icon)}</div>
          <div class="grow">
            <div class="mono fs10 fw7 ls05 mb6" style="color:${w.color}">FORM GUIDE</div>
            <div class="fs12" style="color:#ccc;line-height:1.5">${ex.note}</div>
            <div class="flex gap6 mt8">
              <span class="macro-pill fw7" style="background:${w.color};color:#000">${ex.sets} × ${ex.reps}</span>
              ${ex.rest!=='—'?`<span class="macro-pill" style="background:#222;color:#aaa">⏱ ${ex.rest}</span>`:''}
            </div>
          </div>
        </div>
        <button class="done-btn" onclick="event.stopPropagation();checkEx(${i})" style="background:${done?'#222':w.color};color:${done?'#888':'#000'}">${done?'✓ Completed — Undo?':'✓ Mark Complete'}</button>
      </div>`:''}
    </div>`;
  });
  document.getElementById('exerciseList').innerHTML=list;
}
function setDay(d){activeDay=d;expandedEx=-1;renderWorkout()}
function toggleEx(i){expandedEx=expandedEx===i?-1:i;renderWorkout()}
function checkEx(i){const k=activeDay+'-'+i;checkedEx[k]=!checkedEx[k];renderWorkout()}

  });

}
function setMonths(m){months=m;updateProjection()}
function switchProjView(v){
  projView=v;
  document.querySelectorAll('[data-pv]').forEach(b=>{b.style.background=b.dataset.pv===v?'#4ECDC4':'transparent';b.style.color=b.dataset.pv===v?'#000':'#777'});
  updateProjection();
}
function updateProjection(){
  calories=+document.getElementById('calSlider').value;
  document.getElementById('calSlider').style.background=`linear-gradient(to right,#4ECDC4 ${((calories-1500)/1000)*100}%,#2a2a2a ${((calories-1500)/1000)*100}%)`;
  document.getElementById('calLabel').textContent=calories+' kcal';
  const deficit=STATS.tdee-calories,wl=Math.round(((deficit*7)/7700)*100)/100;
  const tw=months*4,weeks=[];
  for(let i=0;i<=tw;i++)weeks.push({w:i,kg:Math.round(Math.max(STATS.weight-wl*i,50)*10)/10});
  const totalLoss=Math.round((STATS.weight-weeks[weeks.length-1].kg)*10)/10;

  document.getElementById('projStats').innerHTML=[
    {l:'DEFICIT',v:deficit,u:'kcal/day',c:'#FF6B6B'},
    {l:'PER WEEK',v:wl,u:'kg/week',c:'#F59E0B'},
    {l:'TOTAL',v:totalLoss,u:`kg in ${months}mo`,c:'#4ECDC4'}
  ].map(s=>`<div class="stat-card"><div class="fs10 c888 mb3">${s.l}</div><div class="fs20 fw7" style="color:${s.c}">${s.v}</div><div class="fs10 c555">${s.u}</div></div>`).join('');

  renderMonthBtns();
  const pc=document.getElementById('projContent');

  if(projView==='curve'){
    const cW=620,cH=240,pL=48,pR=18,pT=18,pB=30,iW_=cW-pL-pR,iH_=cH-pT-pB;
    const maxW=STATS.weight+1,minW=Math.floor(weeks[weeks.length-1].kg-2),rng=maxW-minW;
    const pts=weeks.map((d,i)=>({x:pL+(i/(weeks.length-1))*iW_,y:pT+((maxW-d.kg)/rng)*iH_,...d}));
    let lp=pts.map((p,i)=>{if(!i)return`M ${p.x} ${p.y}`;const pr=pts[i-1];return`C ${pr.x+(p.x-pr.x)*.4} ${pr.y} ${pr.x+(p.x-pr.x)*.6} ${p.y} ${p.x} ${p.y}`}).join(' ');
    const ap=lp+` L ${pts[pts.length-1].x} ${pT+iH_} L ${pts[0].x} ${pT+iH_} Z`;
    const yT=[];const st=rng<=10?1:rng<=20?2:5;for(let v=Math.ceil(minW/st)*st;v<=maxW;v+=st)yT.push(v);
    const xL=[];if(weeks.length<=9)weeks.forEach((_,i)=>xL.push({i,l:i?'W'+i:'Start'}));else for(let m=0;m<=months;m++){const wi=m*4;if(wi<=weeks.length-1)xL.push({i:wi,l:m?'M'+m:'Start'})}
    let svgPts='';pts.forEach((p,i)=>{const show=pts.length<=12||i%(Math.ceil(pts.length/10))===0||i===pts.length-1||!i;if(show)svgPts+=`<circle cx="${p.x}" cy="${p.y}" r="4" fill="#4ECDC4" stroke="#0C0C0C" stroke-width="2.5"/>`});
    pc.innerHTML=`<div class="card r16" style="padding:14px 8px 8px;overflow:hidden"><div class="ovxa">
      <svg viewBox="0 0 ${cW} ${cH}" style="width:100%;min-width:300px;display:block">
        ${yT.map(v=>{const y=pT+((maxW-v)/rng)*iH_;return`<line x1="${pL}" x2="${cW-pR}" y1="${y}" y2="${y}" stroke="#222" stroke-width=".5"/><text x="${pL-6}" y="${y+4}" text-anchor="end" fill="#555" font-size="10" font-family="DM Sans">${v}</text>`}).join('')}
        <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4ECDC4" stop-opacity=".25"/><stop offset="100%" stop-color="#4ECDC4" stop-opacity=".02"/></linearGradient></defs>
        <path d="${ap}" fill="url(#ag)"/><path d="${lp}" fill="none" stroke="#4ECDC4" stroke-width="2.5" stroke-linecap="round"/>
        ${svgPts}
        <text x="${pts[0].x}" y="${pts[0].y-10}" text-anchor="middle" fill="#FF6B6B" font-size="11" font-weight="700" font-family="DM Sans">${pts[0].kg}kg</text>
        <text x="${pts[pts.length-1].x}" y="${pts[pts.length-1].y-10}" text-anchor="middle" fill="#4ECDC4" font-size="11" font-weight="700" font-family="DM Sans">${pts[pts.length-1].kg}kg</text>
        ${xL.map(x=>`<text x="${pL+(x.i/(pts.length-1))*iW_}" y="${cH-6}" text-anchor="middle" fill="#555" font-size="10" font-family="DM Sans">${x.l}</text>`).join('')}
      </svg></div>
      <div class="flex between center mt8" style="background:#0C0C0C;border-radius:10px;padding:8px 12px">
        <div><span class="fs12 c888">${months}mo: </span><span class="fs15 fw7">${STATS.weight}kg </span><span class="c555">→ </span><span class="fs15 fw7" style="color:#4ECDC4">${pts[pts.length-1].kg}kg</span></div>
        <div style="background:#4ECDC420;padding:3px 10px;border-radius:8px;color:#4ECDC4;font-weight:700;font-size:14px">-${totalLoss}kg</div>
      </div></div>`;
  } else if(projView==='monthly'){
    let h='<div class="flex col gap7">';
    for(let m=0;m<months;m++){
      const sW=weeks[m*4]?.kg??weeks[weeks.length-1].kg,eW=weeks[Math.min((m+1)*4,weeks.length-1)]?.kg??weeks[weeks.length-1].kg;
      const lost=Math.round((sW-eW)*10)/10;
      h+=`<div class="card p14"><div class="flex between center mb6"><div class="flex center gap10"><div style="width:34px;height:34px;border-radius:10px;background:#4ECDC418;display:flex;align-items:center;justify-content:center;color:#4ECDC4;font-weight:700;font-size:12px" class="mono">M${m+1}</div><div><div class="fs13 fw6">Month ${m+1}</div><div class="fs11 c666">${sW}kg → ${eW}kg</div></div></div><div class="fs17 fw7" style="color:#4ECDC4">-${lost}kg</div></div><div style="height:4px;background:#222;border-radius:2px;overflow:hidden"><div style="height:100%;width:${Math.min((lost/4)*100,100)}%;background:linear-gradient(90deg,#4ECDC4,#4ECDC488);border-radius:2px"></div></div></div>`;
    }
    const bmi=(weeks[weeks.length-1].kg/(1.7*1.7)).toFixed(1);
    h+=`<div class="card" style="background:#4ECDC410;border-color:#4ECDC430;padding:14px"><div class="flex between center"><div><div class="fs13 fw6" style="color:#4ECDC4">Total transformation</div><div class="fs11 c888 mt2">${months} month${months>1?'s':''} consistent</div></div><div class="mono fs26 fw7" style="color:#4ECDC4">-${totalLoss}kg</div></div><div class="flex gap8 mt10"><div class="grow tac" style="background:#0C0C0C;border-radius:8px;padding:6px 10px"><div class="fs10 c666">FROM</div><div class="fs15 fw7" style="color:#FF6B6B">${STATS.weight}kg</div></div><div class="flex center c555">→</div><div class="grow tac" style="background:#0C0C0C;border-radius:8px;padding:6px 10px"><div class="fs10 c666">TO</div><div class="fs15 fw7" style="color:#4ECDC4">${weeks[weeks.length-1].kg}kg</div></div><div class="flex center c555">→</div><div class="grow tac" style="background:#0C0C0C;border-radius:8px;padding:6px 10px"><div class="fs10 c666">BMI</div><div class="fs15 fw7" style="color:#F59E0B">${bmi}</div></div></div></div></div>`;
    pc.innerHTML=h;
  } else {
    pc.innerHTML=`<div class="flex col gap6">
      ${[{m:'Month 1-2',d:'Face slims down, arms tone up, clothes feel looser',c:'#FF6B6B'},{m:'Month 2-3',d:'Upper belly starts flattening noticeably',c:'#F59E0B'},{m:'Month 3-5',d:'Visible core definition starts to appear',c:'#4ECDC4'},{m:'Month 5+',d:'Lower belly fat significantly reduced',c:'#A855F7'}].map(t=>`<div class="card p14 flex center gap12"><div style="width:8px;height:8px;border-radius:50%;background:${t.c};flex-shrink:0"></div><div><span class="fs12 fw7" style="color:${t.c}">${t.m}: </span><span class="fs12 c999">${t.d}</span></div></div>`).join('')}
      <div class="card p14 mt4">
        <div class="fs11 fw6 c888 ls05 mb8">HOW THE MATH WORKS</div>
        ${[{l:'Your TDEE (burn/day)',v:STATS.tdee+' kcal',c:'#FF6B6B'},{l:'You eat (target)',v:calories+' kcal',c:'#F59E0B'},{l:'Daily deficit',v:deficit+' kcal',c:'#4ECDC4'},{l:'1 kg fat =',v:'7,700 kcal',c:'#888',border:true},{l:'Loss per week',v:wl+' kg',c:'#4ECDC4'},{l:'Total in '+months+' mo',v:totalLoss+' kg',c:'#4ECDC4'}].map(r=>`<div class="flex between" style="padding:5px 0;${r.border?'border-top:1px solid #222':''}"><span class="fs12 c999">${r.l}</span><span class="fs12 fw6" style="color:${r.c}">${r.v}</span></div>`).join('')}
      </div>
    </div>`;
  }
}

let expandedMeal=-1;
function switchDietView(v){
  dietView=v;

}
function toggleMeal(i){expandedMeal=expandedMeal===i?-1:i;renderDiet()}

function renderDiet(){
  const totalCal=meals.reduce((s,m)=>s+m.cal,0);
  const totalP=meals.reduce((s,m)=>s+m.protein,0);
  const totalC=meals.reduce((s,m)=>s+m.carbs,0);
  const totalF=meals.reduce((s,m)=>s+m.fat,0);
  document.getElementById('dietCalTotal').textContent=totalCal.toLocaleString();
  document.getElementById('macroCards').innerHTML=[
    {l:'PROTEIN',v:totalP+'g',pct:Math.round((totalP*4/totalCal)*100)+'%',c:'#FF6B35'},
    {l:'CARBS',v:totalC+'g',pct:Math.round((totalC*4/totalCal)*100)+'%',c:'#4ECDC4'},
    {l:'FATS',v:totalF+'g',pct:Math.round((totalF*9/totalCal)*100)+'%',c:'#F59E0B'}
  ].map(m=>`<div class="stat-card"><div class="fs10 c888 mb3">${m.l}</div><div class="fs20 fw7" style="color:${m.c}">${m.v}</div><div class="fs10 c555">${m.pct} of calories</div></div>`).join('');

  const dc=document.getElementById('dietContent');

  if(dietView==='meals'){
    let h='<div class="flex col gap8">';
    meals.forEach((meal,mi)=>{
      const open=expandedMeal===mi;
      h+=`<div class="meal-card" style="${open?'border-color:'+meal.color+'55':''}">
        <div class="meal-header" onclick="toggleMeal(${mi})">
          <div class="meal-time" style="background:${meal.color}18">${meal.emoji}</div>
          <div class="grow">
            <div class="flex between center">
              <div>
                <div class="fs14 fw6 cfff">${meal.name}</div>
                <div class="fs11 c666 mt2">${meal.time}</div>
              </div>
              <div class="tar">
                <div class="fs16 fw7" style="color:${meal.color}">${meal.cal}</div>
                <div class="fs10 c555">kcal</div>
              </div>
            </div>
            <div class="flex gap5 mt4">
              <span class="macro-pill" style="background:#FF6B3515;color:#FF6B35">P: ${meal.protein}g</span>
              <span class="macro-pill" style="background:#4ECDC415;color:#4ECDC4">C: ${meal.carbs}g</span>
              <span class="macro-pill" style="background:#F59E0B15;color:#F59E0B">F: ${meal.fat}g</span>
            </div>
          </div>
          <div class="arrow${open?' open':''}">▼</div>
        </div>
        ${open?`<div style="padding:0 14px 14px" class="fadeIn">
          <div style="background:#0a0a0a;border-radius:12px;padding:12px 14px">
            ${meal.foods.map(f=>`<div class="food-item">
              <div style="font-size:22px;width:32px;text-align:center">${f.emoji}</div>
              <div class="grow">
                <div class="fs13 cfff">${f.name}</div>
                <div class="flex gap6 mt3">
                  <span class="fs10 c888">${f.cal} kcal</span>
                  ${f.isProtein?`<span class="protein-badge">🔥 ${f.protein}g protein</span>`:`<span class="fs10 c555">${f.protein}g protein</span>`}
                </div>
              </div>
            </div>`).join('')}
          </div>
        </div>`:''}
      </div>`;
    });
    h+=`<div class="card" style="background:#FF6B3510;border-color:#FF6B3530;padding:14px">
      <div class="flex between center">
        <div><div class="fs14 fw6" style="color:#FF6B35">Daily protein total</div><div class="fs11 c888 mt2">Target: 130-150g for fat loss at 80kg</div></div>
        <div><div class="mono fs26 fw7" style="color:#FF6B35">${totalP}g</div><div class="fs10 c555 tar">✓ On target</div></div>
      </div>
    </div></div>`;
    dc.innerHTML=h;
  } else if(dietView==='protein'){
    let h='<div class="flex col gap7">';
    h+=`<div class="card p14" style="border-left:4px solid #FF6B35">
      <div class="fs14 fw6 cfff">Your daily protein target</div>
      <div class="flex gap12 mt8">
        <div class="grow tac" style="background:#0C0C0C;border-radius:8px;padding:8px"><div class="fs10 c666">MINIMUM</div><div class="fs18 fw7" style="color:#FF6B35">130g</div></div>
        <div class="grow tac" style="background:#0C0C0C;border-radius:8px;padding:8px"><div class="fs10 c666">OPTIMAL</div><div class="fs18 fw7" style="color:#4ECDC4">150g</div></div>
        <div class="grow tac" style="background:#0C0C0C;border-radius:8px;padding:8px"><div class="fs10 c666">PER MEAL</div><div class="fs18 fw7" style="color:#F59E0B">~30g</div></div>
      </div>
    </div>`;
    proteinSources.forEach(p=>{
      const barW=Math.min((p.per100g/35)*100,100);
      h+=`<div class="card p14">
        <div class="flex center gap12">
          <div style="font-size:28px;width:40px;text-align:center">${p.emoji}</div>
          <div class="grow">
            <div class="flex between center">
              <div class="fs14 fw6 cfff">${p.name}</div>
              <div class="fw7" style="color:#FF6B35">${p.per100g}g<span class="fs10 c666 fw6"> /100g</span></div>
            </div>
            <div style="height:4px;background:#222;border-radius:2px;margin:6px 0;overflow:hidden">
              <div style="height:100%;width:${barW}%;background:linear-gradient(90deg,#FF6B35,#FF6B3588);border-radius:2px"></div>
            </div>
            <div class="flex between">
              <span class="fs11 c888">${p.serving}</span>
              <span class="fs10 c555">${p.cal} kcal/100g</span>
            </div>
            <div class="fs11 mt4" style="color:#666;font-style:italic">💡 ${p.tip}</div>
          </div>
        </div>
      </div>`;
    });
    h+='</div>';
    dc.innerHTML=h;
  } else {
    dc.innerHTML=`<div class="flex col gap8">
      ${[
        {emoji:'🥩',title:'Protein timing',desc:'Eat 25-35g protein every 3-4 hours. Post-workout within 1 hour. Casein before bed for overnight recovery.',c:'#FF6B35'},
        {emoji:'🍚',title:'Carb strategy',desc:'Eat most carbs around your workout (pre & post). Lower carb on rest days. Choose complex carbs: oats, brown rice, sweet potato.',c:'#4ECDC4'},
        {emoji:'🥑',title:'Healthy fats',desc:'Don\'t cut fats below 40g/day — you need them for hormones. Get them from nuts, avocado, olive oil, fish.',c:'#F59E0B'},
        {emoji:'🥦',title:'Volume eating',desc:'Fill half your plate with vegetables. They\'re low calorie, high fiber, and keep you full. Broccoli, spinach, capsicum are your friends.',c:'#22c55e'},
        {emoji:'💧',title:'Hydration rules',desc:'3+ litres daily. Drink 500ml 30 min before meals — reduces hunger. Often thirst feels like hunger.',c:'#3B82F6'},
        {emoji:'🚫',title:'Foods to limit',desc:'Cut sugary drinks, fried food, white bread, alcohol, processed snacks. These are calorie-dense with no nutritional benefit.',c:'#FF6B6B'},
        {emoji:'📱',title:'Track everything',desc:'Use MyFitnessPal or similar app for first 2-3 weeks. After that you\'ll naturally know portion sizes.',c:'#A855F7'},
        {emoji:'🍽️',title:'Meal prep tip',desc:'Cook chicken, rice, and vegetables in bulk on Sunday. Pack into containers for the week. Consistency beats perfection.',c:'#F59E0B'}
      ].map(t=>`<div class="card p14 flex gap12" style="border-left:3px solid ${t.c}">
        <div style="font-size:24px">${t.emoji}</div>
        <div><div class="fs13 fw6 cfff">${t.title}</div><div class="fs12 c888 mt3" style="line-height:1.5">${t.desc}</div></div>
      </div>`).join('')}
    </div>`;
  }
}

// Init
renderWorkout();
</script>
</body>
</html>
